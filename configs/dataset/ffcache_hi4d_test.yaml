base_ff_config: &base_ff_config
  _target: reconstruction.neuralbody.datasets.factory.CachedFFGenerator
  ff_path: //home/vr/dev/leonsht/frames_folders/hi4d-v3
  frames: ${range:40,60}
  generator_caching: true
  save_locally: true
  individulally_iterated_instances:
  - 0
  - 1
  per_instance_colors:
  - 300
  - 360
  permute_cameras: false
  permute_frames: none
  resize_ratio: 0.5
  object_source: smpl_hi4d

metainfo:
  gender: male
  frames_count: ${len:${..base_ff_config.frames}}
  subject: ${..base_ff_config.ff_path}

train:
  type: FFCache
  batch_size: 1
  drop_last: False
  shuffle: True
  worker: 0
  num_sample: &ray_batch_size 2048
  pixel_per_batch: *ray_batch_size
  ff_config: 
    <<: *base_ff_config
    cameras:
    - Up_10
    - Up_28
    - Up_118
    - Up_172
    - Up_208
    - Up_244
    - Up_298
    - Up_334
    - Down_18
    - Down_126
    - Down_144
    - Down_198
    - Down_234
    - Down_252
    - Down_270
    - Down_324

valid: &valid_datasets
  - type: FFCache
    batch_size: 1
    drop_last: False
    shuffle: False
    worker: 0
    num_sample: -1
    pixel_per_batch: *ray_batch_size
    ff_config: 
      <<: *base_ff_config
      resize_ratio: 0.125
      cameras:
      - Up_226
      - Down_54

  - type: FFCache
    batch_size: 1
    drop_last: False
    shuffle: False
    worker: 0
    num_sample: -1
    pixel_per_batch: *ray_batch_size
    ff_config: 
      <<: *base_ff_config
      resize_ratio: 0.125
      cameras:
      - Close_318
      - Close_222
      - Close_246
      - Close_126
      - Close_78

test: *valid_datasets

